services:
  db:
    image: pgvector/pgvector:0.8.2-pg16
    container_name: halalchecker-db
    environment:
      POSTGRES_USER: halalchecker
      POSTGRES_PASSWORD: halalchecker
      POSTGRES_DB: halalchecker
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U halalchecker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: halalchecker-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://halalchecker:halalchecker@db:5432/halalchecker"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
